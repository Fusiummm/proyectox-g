<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Datos - Proyecto</title>
    <style>
        body { 
            background-color: #121212; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        #game-container { 
            width: 800px; 
            height: 600px; 
            max-width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script type="text/javascript">
        // Configuración directa y limpia
        window.EJS_player = '#game';
        window.EJS_core = 'psx'; 
        window.EJS_color = '#0078d7';
        
        // El seguro de vida: Declarar esto como 'null' evita errores de código 
        // y activa el modo de carga manual nativo del emulador.
        window.EJS_gameUrl = null; 

        // Arrancar núcleo
        const script = document.createElement('script');
        script.src = 'https://www.emulatorjs.com/loader.js';
        document.body.appendChild(script);
    </script>

</body>
</html>
