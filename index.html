<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Datos - Proyecto</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #menu-container {
            margin-top: 15vh;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 500px;
            max-width: 90%;
        }

        h1 { margin-top: 0; font-size: 22px; color: #fff; }
        p { font-size: 14px; color: #aaa; margin-bottom: 20px;}

        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 15px;
        }

        button {
            background: #0078d7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-weight: bold;
        }

        button:hover { background: #005a9e; }

        #game-container { 
            display: none;
            width: 800px; 
            height: 600px; 
            max-width: 100%; 
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>Visor de Archivos</h1>
        <p>Selecciona el recurso a procesar:</p>
        
        <select id="game-selector">
            <option value="007%20-%20The%20World%20Is%20Not%20Enough.chd">007 - The World Is Not Enough</option>
            <option value="Crash%20Bandicoot%201.chd">Crash Bandicoot 1</option>
            <option value="Crash%20Bandicoot%202%20-%20Cortex%20Strikes%20Back.chd">Crash Bandicoot 2</option>
            <option value="Crash%20Bandicoot%203%20-%20Warped.chd">Crash Bandicoot 3</option>
            <option value="Crash%20Team%20Racing.chd">Crash Team Racing</option>
            <option value="Dino%20Crisis%201.chd">Dino Crisis 1</option>
            <option value="Dragon%20Ball%20GT%20-%20Final%20Bout.chd">Dragon Ball GT - Final Bout</option>
            <option value="Gran%20Turismo%201.chd">Gran Turismo 1</option>
            <option value="Marvel%20vs.%20Capcom%20-%20Clash%20of%20Super%20Heroes.chd">Marvel vs. Capcom</option>
            <option value="Megaman%20X4.chd">Megaman X4</option>
            <option value="Metal%20Gear%20Solid%20-%20VR%20Missions.chd">Metal Gear Solid - VR Missions</option>
            <option value="Mortal%20Kombat%20Trilogy.chd">Mortal Kombat Trilogy</option>
            <option value="Resident%20Evil%201.chd">Resident Evil 1</option>
            <option value="Silent%20Hill.chd">Silent Hill</option>
            <option value="Tekken%203.chd">Tekken 3</option>
            <option value="Tomb%20Raider%201.chd">Tomb Raider 1</option>
            <option value="Tony%20Hawk's%20Pro%20Skater%202.chd">Tony Hawk's Pro Skater 2</option>
        </select>
        
        <button onclick="iniciarJuego()">Procesar Datos</button>
    </div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script type="text/javascript">
        function iniciarJuego() {
            // El servidor directo de Archive.org que capturamos cuando funcionó
            const servidorBase = 'https://dn710605.ca.archive.org/0/items/ps1-rip-chd-ck/'; 
            
            const nombreArchivo = document.getElementById('game-selector').value;
            const urlFinal = servidorBase + nombreArchivo;
            
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            window.EJS_player = '#game';
            window.EJS_core = 'psx'; 
            window.EJS_biosUrl = 'SCPH-5501.BIN'; 
            window.EJS_gameUrl = urlFinal; 
            window.EJS_color = '#0078d7';
            
            const script = document.createElement('script');
            script.src = 'https://www.emulatorjs.com/loader.js';
            document.body.appendChild(script);
        }
    </script>

</body>
</html>
