<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Datos - Proyecto</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #menu-container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            width: 400px;
            max-width: 90%;
        }

        h1 { margin-top: 0; font-size: 22px; color: #fff; }
        p { font-size: 14px; color: #aaa; margin-bottom: 25px;}

        button {
            background: #0078d7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            font-weight: bold;
        }

        button:hover { background: #005a9e; }

        /* Contenedor del emulador */
        #game-container { 
            display: none;
            width: 800px; 
            height: 600px; 
            max-width: 100%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
        }
    </style>
</head>
<body>

    <div id="menu-container">
        <h1>Entorno de Trabajo</h1>
        <p>Inicia la máquina virtual para procesar datos locales.</p>
        <button onclick="iniciarEntorno()">Iniciar Máquina</button>
    </div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script type="text/javascript">
        function iniciarEntorno() {
            // Ocultar menú y mostrar emulador
            document.getElementById('menu-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            // Configuración base (SIN urls de juegos ni bios, totalmente limpio)
            window.EJS_player = '#game';
            window.EJS_core = 'psx'; 
            window.EJS_color = '#0078d7';

            // Cargar núcleo
            const script = document.createElement('script');
            script.src = 'https://www.emulatorjs.com/loader.js';
            document.body.appendChild(script);
        }
    </script>

</body>
</html>
